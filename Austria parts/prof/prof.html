<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        .profile-avatar-wrapper {
            position: relative;
            width: 130px;
            height: 130px;
        }
        .profile-avatar {
            width: 130px;
            height: 130px;
            object-fit: cover;
            border: 4px solid #fff;
        }
        .avatar-upload-btn {
            position: absolute;
            bottom: 2px;
            right: 2px;
            border-radius: 50%;
            padding: 6px 9px;
        }
        .nav-pills .nav-link.active {
            background-color: #0d6efd;
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="bi bi-airplane-engines me-2"></i>TravelPortal</a>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="row">
            
            <div class="col-lg-3 mb-4">
                <div class="card text-center shadow-sm">
                    <div class="card-body">
                        <div class="profile-avatar-wrapper mx-auto mb-3">
                            <img id="avatarPreview" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&q=80" class="rounded-circle profile-avatar shadow-sm" alt="User Avatar">
                            <label for="avatarUpload" class="btn btn-primary btn-sm avatar-upload-btn shadow" title="Upload new photo">
                                <i class="bi bi-camera-fill"></i>
                                <input type="file" id="avatarUpload" class="d-none" accept="image/*">
                            </label>
                        </div>
                        <h5 class="card-title mb-0" id="summaryName">Alex Morgan</h5>
                        <p class="text-muted small mb-3">Frequent Flyer</p>
                        
                        <hr>

                        <div class="nav flex-column nav-pills text-start" id="profileTabs" role="tablist" aria-orientation="vertical">
                            <button class="nav-link active mb-2" id="personal
