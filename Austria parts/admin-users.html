    <div class="container mb-5">
        <h1 class="display-4 mb-4">Profile</h1>

        <div class="row g-4 align-items-stretch">

            <div class="col-md-4 col-lg-4">
                <div class="card h-100 shadow-sm text-center">
                    <div class="pt-4">
                        <img src="images/profile.jpg" class="rounded-circle img-thumbnail w-50" alt="Profile Picture" onerror="this.src='https://via.placeholder.com/150'">
                    </div>
                    <div class="card-body d-flex flex-column">
                        <h4 class="card-title mt-2">Carlos</h4>
                        <p class="text-muted small">Admin</p>
                        <hr>
                        <div class="list-group list-group-flush text-start">
                            <a href="#" class="list-group-item list-group-item-action active bg-primary border-primary">Personal Information</a>
                            <a href="#" class="list-group-item list-group-item-action">Saved Passengers</a>
                            <a href="#" class="list-group-item list-group-item-action">Payment Methods</a>
                            <a href="#" class="list-group-item list-group-item-action">Travel History</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-8 col-lg-8">
                <div class="card h-100 shadow-sm p-4">
                    <h3 class="mb-4">Personal Information</h3>
                    
                    <form class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label font-weight-bold">First Name</label>
                            <input type="text" class="form-control" value="Carlos" readonly>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label font-weight-bold">Last Name</label>
                            <input type="text" class="form-control" value="User" readonly>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label font-weight-bold">Email Address</label>
                            <input type="email" class="form-control" value="email@example.com" readonly>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label font-weight-bold">Contact Number</label>
                            <input type="text" class="form-control" value="123example" readonly>
                        </div>
                    </form>

                    <div class="row g-2 mt-auto pt-4">
                        <div class="col-6 col-md-3">
                            <button type="button" class="btn btn-primary w-100 py-2 fs-5">Edit</button>
                        </div>
                    </div>
                </div>
            </div>

        </div> 
    </div>
