<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AirRoute Admin - Manage Passenger Accounts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand text-warning">AirRoute Admin Center</span>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="admin-dashboard.html">Dashboard Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="admin-flights.html">Manage Flights</a></li>
                    <li class="nav-item"><a class="nav-link active" href="admin-users.html">Manage Users</a></li>
                    <li class="nav-item"><a class="nav-link" href="admin-reservations.html">Manage Bookings</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h3>User Registration</h3>

        <div class="row my-3">
            <div class="col-md-6">
                <input type="text" id="filterUserNameBox" class="form-control" placeholder="Search customer by name">
            </div>
        </div>

        <table class="table table-bordered table-striped bg-white text-center shadow-sm">
            <thead class="table-dark">
                <tr>
                    <th>Customer Name</th>
                    <th>Email</th>
                    <th>Account Status</th>
                    <th>Toggles</th>
                </tr>
            </thead>
            <tbody>
                <tr class="passenger-account-row" data-fullname="Roshni Pathak">
                    <td>Roshni Pathak</td>
                    <td>roshni.pathak@dlsu.edu.ph</td>
                    <td><span class="badge bg-success status-lbl-indicator">Active</span></td>
                    <td>
                        <button class="btn btn-sm btn-warning toggle-lockout-state-btn">Toggle Account Status Hold</button>
                    </td>
                </tr>
                <tr class="passenger-account-row" data-fullname="Juan Gomez">
                    <td>Juan Gomez</td>
                    <td>juan.gomez@dlsu.edu.ph</td>
                    <td><span class="badge bg-success status-lbl-indicator">Active</span></td>
                    <td>
                        <button class="btn btn-sm btn-warning toggle-lockout-state-btn">Toggle Account Status Hold</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function() {

            // lock and suspend toggle modifier helper logic script
            $('.toggle-lockout-state-btn').click(function() {
                var labelBadge = $(this).closest('tr').find('.status-lbl-indicator');
                
                if (labelBadge.text() == "Active") {
                    labelBadge.text("Suspended").removeClass('bg-success').addClass('bg-danger');
                } else {
                    labelBadge.text("Active").removeClass('bg-danger').addClass('bg-success');
                }
            });

            // quick client search keyboard typing input filters handler
            $('#filterUserNameBox').on('input', function() {
                var textValueInput = $(this).val().toLowerCase();
                
                $('.passenger-account-row').each(function() {
                    var stringMatchName = $(this).attr('data-fullname').toLowerCase();
                    if (stringMatchName.indexOf(textValueInput) > -1) {
                        $(this).show();
                    } else {
                        $(this).hide();
                    }
                });
            });

        });
    </script>
</body>
</html>
