<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">PUT NAME OF OUR COMPANY HERE</a>
        </div>
    </nav>

    <div class="container mb-5">
        <h1 class="display-4 mb-4">Reservations</h1>

        <div class="card p-3 mb-4 shadow-sm">
            <div class="row g-3">
                <div class="col-md-4">
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                        <input type="text" id="searchInput" class="form-control" placeholder="Search by name or ID...">
                    </div>
                </div>
                <div class="col-md-4">
                    <select id="statusFilter" class="form-select">
                        <option value="all">All Statuses</option>
                        <option value="Confirmed">Confirmed</option>
                        <option value="Pending">Pending</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <select id="sortSelect" class="form-select">
                        <option value="date-asc">Date: Earliest First</option>
                        <option value="date-desc">Date: Latest First</option>
                        <option value="name-asc">Name: A to Z</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="row g-4 align-items-stretch">

            <div class="col-md-4 col-lg-4">
                <div class="card h-100 shadow-sm">
                    <div class="text-center pt-3">
                        <img src="images/crewmate.jpg" class="card-img-top w-50" alt="Reservation Image">
                    </div>
                    <div class="card-body d-flex flex-column text-center">
                        <h5 class="card-title">Reservation 1</h5>
                        <h6 class="card-subtitle text-danger mb-2">Status: Cancelled</h6>
                        <p class="card-text">A room with idk in it.</p>
                        <div class="row g-2 mt-auto">
                            <div class="col-6">
                                <a href="#" class="btn btn-success w-100 py-2 fs-5">View</a>
                            </div>
                            <div class="col-6">
                                <a href="#" class="btn btn-primary w-100 py-2 fs-5">Edit</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-lg-4">
                <div class="card h-100 shadow-sm">
                    <div class="text-center pt-3">
                    <img src="images/crewmate.jpg" class="card-img-top w-50" alt="Reservation Image">
                    </div>
                    <div class="card-body d-flex flex-column text-center">
                        <h5 class="card-title">Reservation 2</h5>
                        <h6 class="card-subtitle text-success mb-2">Status: Confirmed</h6>
                        <p class="card-text">A room with idk in it.</p>
                        <div class="row g-2 mt-auto">
                            <div class="col-6">
                                <a href="#" class="btn btn-success w-100 py-2 fs-5">View</a>
                            </div>
                            <div class="col-6">
                                <a href="#" class="btn btn-primary w-100 py-2 fs-5">Edit</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-lg-4">
                <div class="card h-100 shadow-sm">
                    <div class="text-center pt-3">
                    <img src="images/crewmate.jpg" class="card-img-top w-50" alt="Reservation Image">
                    </div>
                    <div class="card-body d-flex flex-column text-center">
                        <h5 class="card-title">Reservation 3</h5>
                        <h6 class="card-subtitle text-warning mb-2">Status: Pending</h6>
                        <p1 class="card-text">A room with idk in it.</p1>
                        <div class="row g-2 mt-auto">
                            <div class="col-6">
                                <a href="#" class="btn btn-success w-100 py-2 fs-5">View</a>
                            </div>
                            <div class="col-6">
                                <a href="#" class="btn btn-primary w-100 py-2 fs-5">Edit</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
