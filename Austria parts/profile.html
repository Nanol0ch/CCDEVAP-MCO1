<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - AirRoute</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">AirRoute</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="search.html">Search Flights</a></li>
                    <li class="nav-item"><a class="nav-link" href="booking.html">Book Flight</a></li>
                    <li class="nav-item"><a class="nav-link active" href="reservations.html">My Reservations</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html">User Profile</a></li>
                    <li class="nav-item"><a class="nav-link" href="admin-dashboard.html">Admin Panel</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Title -->
<div class="bg-primary text-white py-4" style="padding-left: 50px; padding-right: 50px;">
    <h2> Find Your Flight </h2>
    <p class="mb-0"> Search across top airlines </p>
</div>
    <div class="container my-4">
        <h1 class="mb-4">Profile</h1>
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card w-100">
                    <div class="card-body text-center pb-3">
                        <div class="position-relative d-inline-block mb-3">
                            <img src="images/profile.jpg" id="avatarImg" class="rounded-circle border border-3 border-white shadow-sm" style="width:110px;height:110px;object-fit:cover;" alt="Profile Picture">
                            <button class="btn btn-sm btn-primary rounded-circle position-absolute bottom-0 end-0 p-0 d-flex align-items-center justify-content-center" style="width:34px;height:34px;" onclick="document.getElementById('avatarInput').click()">
                                <i class="bi bi-camera-fill"></i>
                            </button>
                            <input type="file" id="avatarInput" accept="image/*" class="d-none" onchange="previewAvatar(event)">
                        </div>
                        <h5 class="card-title mt-2">Roshni Sharma</h5>
                        
                        <div class="row text-center border-top pt-3 mt-2">
                            <div class="col-6 border-end">
                                <div class="fw-bold">12</div>
                                <div class="text-muted small">Flights Taken</div>
                            </div>
                            <div class="col-6">
                                <div class="fw-bold">28,450</div>
                                <div class="text-muted small">Miles Flown</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="list-group list-group-flush" id="profile-tabs">
                        <a href="#" class="list-group-item list-group-item-action active" data-target="personal">Personal Info</a>
                        <a href="#" class="list-group-item list-group-item-action" data-target="history">Travel History</a>
                        <a href="#" class="list-group-item list-group-item-action" data-target="payment">Payment Methods</a>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card p-4">
                    <h3 id="content-title">Personal Information</h3>
                    <hr>
                    <div id="content-body"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let personalInfo = {
            fullName: "Roshni Sharma",
            email: "roshni.sharma@email.com",
            phone: "+123456789",
            dob: "2000-01-01",
            passport: "P1234567",
            nationality: "Indian"
        };

        // Image Preview Logic
        function previewAvatar(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => { document.getElementById('avatarImg').src = e.target.result; };
                reader.readAsDataURL(file);
            }
        }

        function renderPersonalView() {
            return `
                <div class="row mb-2"><div class="col-sm-4 text-muted">Full Name</div><div class="col-sm-8">${personalInfo.fullName}</div></div>
                <div class="row mb-2"><div class="col-sm-4 text-muted">Email</div><div class="col-sm-8">${personalInfo.email}</div></div>
                <div class="row mb-2"><div class="col-sm-4 text-muted">Phone</div><div class="col-sm-8">${personalInfo.phone}</div></div>
                <div class="row mb-2"><div class="col-sm-4 text-muted">DOB</div><div class="col-sm-8">${personalInfo.dob}</div></div>
                <div class="row mb-2"><div class="col-sm-4 text-muted">Passport</div><div class="col-sm-8">${personalInfo.passport}</div></div>
                <div class="row mb-4"><div class="col-sm-4 text-muted">Nationality</div><div class="col-sm-8">${personalInfo.nationality}</div></div>
                <button class="btn btn-primary" onclick="renderPersonalEdit()">Edit Info</button>
            `;
        }

        function renderPersonalEdit() {
            document.getElementById('content-body').innerHTML = `
                <form class="row g-3">
                    <div class="col-md-6"><label>Full Name</label><input class="form-control" id="pFullName" value="${personalInfo.fullName}"></div>
                    <div class="col-md-6"><label>Email</label><input class="form-control" id="pEmail" value="${personalInfo.email}"></div>
                    <div class="col-md-6"><label>Phone</label><input class="form-control" id="pPhone" value="${personalInfo.phone}"></div>
                    <div class="col-md-6"><label>DOB</label><input type="date" class="form-control" id="pDob" value="${personalInfo.dob}"></div>
                    <div class="col-md-6"><label>Passport</label><input class="form-control" id="pPassport" value="${personalInfo.passport}"></div>
                    <div class="col-md-6"><label>Nationality</label><input class="form-control" id="pNationality" value="${personalInfo.nationality}"></div>
                </form>
                <div class="mt-3">
                    <button class="btn btn-success" onclick="saveData()">Save</button>
                    <button class="btn btn-secondary" onclick="showSection('personal')">Cancel</button>
                </div>
            `;
        }

        function saveData() {
            personalInfo.fullName = document.getElementById('pFullName').value;
            personalInfo.email = document.getElementById('pEmail').value;
            personalInfo.phone = document.getElementById('pPhone').value;
            personalInfo.dob = document.getElementById('pDob').value;
            personalInfo.passport = document.getElementById('pPassport').value;
            personalInfo.nationality = document.getElementById('pNationality').value;
            showSection('personal');
        }

        function renderHistoryView() {
            return `
                <table class="table text-center">
                    <thead><tr><th>Date</th><th>Route</th><th>Flight</th></tr></thead>
                    <tbody>
                        <tr><td>June 1</td><td>PH to Japan</td><td>Flight 1</td></tr>
                        <tr><td>June 2</td><td>Japan to PH</td><td>Flight 2</td></tr>
                    </tbody>
                </table>
            `;
        }

        function renderPaymentView() {
            return `<div class="card p-3"><strong>Visa</strong></div>`;
        }

        function renderSection(key) {
            const sections = { personal: renderPersonalView, history: renderHistoryView, payment: renderPaymentView };
            document.getElementById('content-body').innerHTML = sections[key] ? sections[key]() : '';
        }

        function showSection(key) {
            renderSection(key);
            document.querySelectorAll('.list-group-item').forEach(i => i.classList.toggle('active', i.dataset.target === key));
        }

        document.getElementById('profile-tabs').addEventListener('click', (e) => {
            const target = e.target.closest('.list-group-item');
            if(target) showSection(target.dataset.target);
        });

        showSection('personal');
    </script>
</body>
</html>
