<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AirRoute Admin - Booking Master Lists Ledger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand text-warning">AirRoute Admin Center</span>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="admin-dashboard.html">Dashboard Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="admin-flights.html">Manage Flights</a></li>
                    <li class="nav-item"><a class="nav-link" href="admin-users.html">Manage Users</a></li>
                    <li class="nav-item"><a class="nav-link active" href="admin-reservations.html">Manage Bookings</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h3>Passenger reservations</h3>
        <p class="text-secondary">Edits</p>

        <table class="table table-bordered bg-white text-center align-middle shadow-sm">
            <thead class="table-dark">
                <tr>
                    <th>Booking Code</th>
                    <th>Customer</th>
                    <th>Flight Path</th>
                    <th>Status</th>
                    <th>Alert</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><strong>BK101</strong></td>
                    <td>Roshni Pathak</td>
                    <td>Philippines - Japan</td>
                    <td>
                        <select class="form-select form-select-sm my-dropdown-selector-box">
                            <option value="Confirmed" selected>Confirmed</option>
                            <option value="Pending">Pending</option>
                            <option value="Cancelled">Cancelled</option>
                        </select>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-primary send-out-alert-notice-btn">Push</button>
                    </td>
                </tr>
                <tr>
                    <td><strong>BK102</strong></td>
                    <td>Juan Gomez</td>
                    <td>Philippines - Korea</td>
                    <td>
                        <select class="form-select form-select-sm my-dropdown-selector-box">
                            <option value="Confirmed">Confirmed</option>
                            <option value="Pending">Pending</option>
                            <option value="Cancelled" selected>Cancelled</option>
                        </select>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-primary send-out-alert-notice-btn">Push </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function() {

            // push warning notification emitter mockup trigger script click code box
            $('.send-out-alert-notice-btn').click(function() {
                var rowBookingRef = $(this).closest('tr').find('td:first-child strong').text();
                var currentSelectedOption = $(this).closest('tr').find('.my-dropdown-selector-box').val();
                
                alert("Alert was sent!");
            });

        });
    </script>
</body>
</html>
