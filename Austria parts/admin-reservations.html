    <div class="container mb-5">
        <h1 class="display-4 mb-4">Admin: Passenger Reservations</h1>

        <div class="card p-3 mb-4 shadow-sm">
            <div class="row g-3">
                <div class="col-md-4">
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                        <input type="text" id="searchInput" class="form-control" placeholder="Search by PNR, passenger name...">
                    </div>
                </div>
                <div class="col-md-4">
                    <select id="statusFilter" class="form-select">
                        <option value="all">All Passenger Statuses</option>
                        <option value="Confirmed">Confirmed</option>
                        <option value="Pending">Pending</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <select id="sortSelect" class="form-select">
                        <option value="date-asc">Departure: Earliest First</option>
                        <option value="date-desc">Departure: Latest First</option>
                        <option value="name-asc">Passenger Name: A to Z</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="row g-4 align-items-stretch">

            <div class="col-md-4 col-lg-4">
                <div class="card h-100 shadow-sm">
                    <div class="text-center pt-3">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/36/United_Airlines_Boeing_777-200_Meulemans.jpg/960px-United_Airlines_Boeing_777-200_Meulemans.jpg" class="card-img-top w-50" alt="Reservation Image">
                    </div>
                    <div class="card-body d-flex flex-column text-center">
                        <h5 class="card-title mb-0">John Doe</h5>
                        <small class="text-muted mb-2">Code: PNR-99X1A</small>
                        <h6 class="card-subtitle text-danger mb-2">Status: Cancelled</h6>
                        <p class="card-text">Flight: AR-502 (JFK to LAX)<br>Seat Assignment: Unassigned</p>
                        
                        <div class="row g-2 mt-auto">
                            <div
